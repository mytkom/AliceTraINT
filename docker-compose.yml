version: '3.8'

services:
  alice-traint:
    build:
      context: .
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_NAME=AliceTraINT_db
      - DB_SSLMODE=disable
    ports:
      - "8088:8088"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      # Dev-friendly mounts: allow Tailwind output.css updates to be written to the host repo.
      - ./static:/app/static
      - ./web:/app/web:ro
      - ./tailwind.config.js:/app/tailwind.config.js:ro

  # Development helper: watches templates and css input and regenerates static/css/output.css.
  # This writes output.css into the host repo via the bind mount above.
  tailwind:
    build:
      context: .
    command: >
      sh -lc "tailwindcss -i static/css/input.css -o static/css/output.css --watch --poll"
    volumes:
      - ./static:/app/static
      - ./web:/app/web:ro
      - ./tailwind.config.js:/app/tailwind.config.js:ro

  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: AliceTraINT_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

