{{ define "training-datasets_new" }}
{{ template "header" . }}
<div class="flex gap-3 py-5 min-h-96 max-h-full w-full flex-col lg:flex-row">
    <div
        class="relative lg:w-1/2 w-full border-dotted rounded-md shadow-md dark:shadow-none overflow-hidden bg-sky-50 dark:bg-sky-800">
        <div class="flex flex-col max-h-96 min-h-96" id="file-tree" hx-trigger="load" hx-get="explore-directory"
            hx-vals='{"path":"/alice/sim/"}' hx-indicator="#file-tree-overlay">
        </div>
        <div id="file-tree-overlay" class="display-htmx-indicator absolute inset-0 bg-sky-200 opacity-50 z-10">
            <div class="h-full flex justify-center items-center">
                <img class="size-14 lg:size-20" src="/static/img/spinner.svg" />
            </div>
        </div>
    </div>
    <div
        class="relative lg:w-1/2 w-full border-dotted rounded-md shadow-md dark:shadow-none overflow-hidden bg-sky-50 dark:bg-sky-800">
        
        <div id="random-panel" class="flex flex-col max-h-96 min-h-96 bg-white dark:bg-sky-700 p-3 gap-3">
            <h2 class="text-2xl font-bold tracking-tight">Choose random subset</h2>
            <form id="random-subset-form"
                  class="flex flex-col gap-3"
                  hx-get="select-random-aods"
                  hx-target="#selected-files"
                  hx-target-error="#errors"
                  hx-swap="innerHTML"
                  hx-ext="response-targets"
                  hx-indicator="#file-list-overlay"
                  hx-vals="js:{path: resolvePathForRequest(true)}">
                <div class="flex items-center gap-3">
                    <label for="path-random">Path:</label>
                    <input class="bg-white border-sky-900 text-gray-800 rounded-lg flex-grow text-sm py-1 px-2"
                        placeholder="ex. /alice/sim/2024/LHC24f3/0/523397" type="text" id="path-random" required>
                </div>
                <div class="grid grid-cols-3 gap-3 items-end">
                    <div class="flex flex-col w-full">
                        <label for="runCount">Run count</label>
                        <input type="number"
                               id="runCount"
                               name="runCount"
                               min="1"
                               value="10"
                               class="w-full bg-white border-sky-900 text-gray-800 rounded-lg text-sm py-1 px-2" />
                    </div>
                    <div class="flex flex-col w-full">
                        <label for="filesPerRun">Files per run</label>
                        <input type="number"
                               id="filesPerRun"
                               name="filesPerRun"
                               min="1"
                               value="5"
                               class="w-full bg-white border-sky-900 text-gray-800 rounded-lg text-sm py-1 px-2" />
                    </div>
                    <div class="flex flex-col w-full">
                        <label for="minFileSizeMB">Min file size [MB]</label>
                        <input type="number"
                               id="minFileSizeMB"
                               name="minFileSizeMB"
                               min="0"
                               value="2048"
                               class="w-full bg-white border-sky-900 text-gray-800 rounded-lg text-sm py-1 px-2" />
                    </div>
                </div>
                <button class="self-end bg-sky-900 hover:bg-sky-800 text-gray-50 rounded-lg font-bold py-1 px-2 whitespace-nowrap shrink-0"
                    type="submit" onclick="resolvePathForRequest(true)">Select Random Subset</button>
            </form>
            <div class="flex justify-end items-center gap-2">
                <span>or</span>
                <button id="switch-to-find-button"
                    class="bg-sky-900 hover:bg-sky-800 text-gray-50 rounded-lg font-bold py-1 px-2 whitespace-nowrap"
                    type="button">Find AO2Ds</button>
            </div>
        </div>

        <div id="find-panel" class="hidden flex flex-col max-h-96 min-h-96">
            <form id="find-aods-form"
                class="flex content-stretch bg-white dark:bg-sky-700 justify-end gap-4 items-center p-3"
                hx-get="find-aods" hx-target="#file-list" hx-swap="innerHTML" hx-indicator="#file-list-overlay">
                <label for="path-find">Path:</label>
                <input class="bg-white border-sky-900 text-gray-800 rounded-lg flex-grow text-sm py-1 px-2 max-w-1/2 flex-shrink"
                    placeholder="ex. /alice/sim/2024/LHC24f3/0/523397" type="text" id="path-find" name="path" required>
                <button class="bg-sky-900 hover:bg-sky-800 text-gray-50 rounded-lg font-bold py-1 px-2"
                    type="submit" onclick="resolvePathForRequest(true)">Find AO2Ds</button>
            </form>
            <div class="bg-white dark:bg-sky-700 border-b-2 border-dotted p-3">
                <div class="flex justify-end items-center gap-2">
                    <span>or</span>
                    <button id="switch-to-random-button"
                        class="bg-sky-900 hover:bg-sky-800 text-gray-50 rounded-lg font-bold py-1 px-2 whitespace-nowrap"
                        type="button">Get Random Subset</button>
                </div>
            </div>
            <div id="file-list" class="overflow-y-auto flex-grow min-h-0"></div>
        </div>

        <div id="file-list-overlay" class="display-htmx-indicator absolute inset-0 bg-sky-200 opacity-50 z-10">
            <div class="h-full flex justify-center items-center">
                <img class="size-14 lg:size-20" src="/static/img/spinner.svg" />
            </div>
        </div>
    </div>

</div>

<div class="flex flex-col gap-5 items-center" hx-ext="response-targets">
    <h1 class="text-3xl">Create training Dataset</h1>
    <form id="submit-dataset-form"
          hx-target-4*="#errors"
          hx-target-5*="#errors"
          hx-post="/training-datasets"
          hx-vals="js:{...getSelectedFiles()}"
          hx-ext="json-enc"
          class="grid grid-cols-1 lg:grid-cols-2 items-start auto-rows-auto gap-3 w-full p-2">
        <div class="text-lg text-red-600 col-span-1 lg:col-span-2 text-center w-full" id="errors"></div>
        <label class="justify-self-start lg:justify-self-end text-lg self-center" for="train-dataset-name">Training dataset name:</label>
        <input type="text" class="bg-white border-sky-900 text-gray-800 rounded-lg text-lg py-1 px-2"
            name="name" id="train-dataset-name" required />
        <h2 class="justify-self-start lg:justify-self-end text-lg self-start">Selected files:</h2>
        <ul class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 xl:grid-cols-2 gap-2" id="selected-files"></ul>
        <button
            class="col-span-1 lg:col-span-2 justify-self-end bg-sky-900 hover:bg-sky-800 text-gray-50 rounded-lg font-bold py-1 px-2 text-lg"
            type="submit">Submit</button>
    </form>
</div>

<script>
    function getCurrentTreePath() {
        const treeEl = document.getElementById('tree-current-path');
        return treeEl ? (treeEl.textContent || '').trim() : '';
    }

    function setDatasetPath(pathValue) {
        const value = (pathValue || '').trim();
        if (!value) return '';

        const randomInput = document.getElementById('path-random');
        const findInput = document.getElementById('path-find');
        if (randomInput) randomInput.value = value;
        if (findInput) findInput.value = value;
        return value;
    }

    function resolvePathForRequest(preferTreePath = false) {
        const randomInput = document.getElementById('path-random');
        const findInput = document.getElementById('path-find');
        const typedValue = ((randomInput && randomInput.value) || (findInput && findInput.value) || '').trim();
        const treePath = getCurrentTreePath();

        let v = typedValue;
        if (preferTreePath && treePath) {
            v = treePath;
        } else if (!v) {
            v = treePath;
        }
        return setDatasetPath(v);
    }

    const showFindPanel = () => {
        document.getElementById('random-panel').classList.add('hidden');
        document.getElementById('find-panel').classList.remove('hidden');
    };

    const showRandomPanel = () => {
        document.getElementById('find-panel').classList.add('hidden');
        document.getElementById('random-panel').classList.remove('hidden');
    };

    const clearErrors = () => {
        const errors = document.getElementById('errors');
        if (errors) errors.innerHTML = '';
    };

    const handleFileListBeforeSwap = (event) => {
        const parser = new DOMParser();
        const serializer = new XMLSerializer();
        const fileList = parser.parseFromString(event.detail.serverResponse, 'text/xml');
        const selectedFiles = Array.from(document.querySelectorAll('#selected-files li')).map(item => item.getAttribute('data-path'));

        fileList.querySelectorAll('ul li').forEach(fileListItem => {
            if (selectedFiles.includes(fileListItem.getAttribute('data-path'))) {
                fileListItem.remove();
            }
        });

        event.detail.serverResponse = serializer.serializeToString(fileList);
    };

    const insertSortedDataPath = (listNode, node) => {
        const children = Array.from(listNode.children);
        const before = children.find(it => it.getAttribute('data-path') > node.getAttribute('data-path'))
        listNode.insertBefore(node, before)
    }

    const handleFileClick = (event) => {
        const target = event.target.closest('.file');
        if (!target) return;

        const selectedFilesList = document.getElementById('selected-files')
        const clone = target.cloneNode(true)
        insertSortedDataPath(selectedFilesList, clone);
        target.remove();
    };

    const handleSelectedFileClick = (event) => {
        const target = event.target.closest('.file');
        if (!target) return;

        const fileList = document.querySelector('#file-list ul')
        if (!fileList) return;
        const clone = target.cloneNode(true)
        insertSortedDataPath(fileList, clone)
        target.remove();
    };

    document.getElementById('file-list').addEventListener('htmx:beforeSwap', handleFileListBeforeSwap);
    document.getElementById('file-list').addEventListener('click', handleFileClick);
    document.getElementById('selected-files').addEventListener('click', handleSelectedFileClick);
    document.getElementById('switch-to-find-button').addEventListener('click', function () {
        showFindPanel();
        resolvePathForRequest(true);
        htmx.trigger(document.getElementById('find-aods-form'), 'submit');
    });
    document.getElementById('switch-to-random-button').addEventListener('click', function () {
        resolvePathForRequest(true);
        showRandomPanel();
    });
    document.getElementById('random-subset-form').addEventListener('htmx:beforeRequest', function (evt) {
        resolvePathForRequest(true);
        clearErrors();
        if (document.querySelectorAll('#selected-files li').length === 0) return;
        if (!confirm('You already have files in Selected files. The random subset will replace them. Do you want to continue?')) {
            evt.preventDefault();
        }
    });

    document.getElementById('find-aods-form').addEventListener('htmx:beforeRequest', function () {
        clearErrors();
    });

    document.getElementById('find-aods-form').addEventListener('htmx:afterRequest', function (evt) {
        if (!evt.detail.successful) return;
        clearErrors();
    });

    document.getElementById('random-subset-form').addEventListener('htmx:afterRequest', function (evt) {
        const status = evt.detail.xhr ? evt.detail.xhr.status : 0;
        if (status < 200 || status >= 300) return;
        clearErrors();
        showFindPanel();
        resolvePathForRequest(true);
        htmx.trigger(document.getElementById('find-aods-form'), 'submit');
    });

    const getSelectedFiles = () => {
        const selectedFiles = [];
        document.querySelectorAll('#selected-files li').forEach(function (item) {
            selectedFiles.push({
                Path: item.getAttribute("data-path"),
                LHCPeriod: item.querySelector('[name="LHCPeriod"]').textContent,
                RunNumber: parseInt(item.querySelector('[name="runNumber"]').textContent),
                AODNumber: parseInt(item.querySelector('[name="AODNumber"]').textContent),
                Size: parseInt(item.querySelector('[name="size"]').getAttribute("int-size")),
                Name: "AO2D.root"
            });
        });

        return {
            AODFiles: selectedFiles,
        }
    }
</script>
{{ template "footer" . }}
{{ end }}
