{{ define "docs_index" }}
{{ template "header" . }}
<div class="flex flex-col gap-4 my-4">
    <div class="flex flex-col-reverse justify-start gap-4 md:flex-row md:justify-between items-center">
        <h1 class="text-xl">{{ .Title }}</h1>
    </div>

    <div class="flex flex-col gap-2">
        {{ if .Docs }}
        <ul class="list-disc list-inside space-y-1">
            {{ range .Docs }}
            <li>
                <a href="/docs/{{ .Slug }}" class="text-sky-900 hover:text-sky-700 dark:text-sky-200 dark:hover:text-sky-100 underline">
                    {{ .Title }}
                </a>
            </li>
            {{ end }}
        </ul>
        {{ else }}
        <p class="text-gray-600 dark:text-gray-300">
            No documentation pages found. Add <code>.md</code> files to the configured docs directory to get started.
        </p>
        {{ end }}
    </div>
</div>
{{ template "footer" . }}
{{ end }}
